  <!-- Virtual 3D Birthday Cake â€” make a wish, blow out the candles -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Make a Wish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-1: #1a1030;
      --bg-2: #2a1640;
      --bg-glow: #ff7a59;
      --cream: #fff4e6;
      --pink: #ff9eb5;
      --coral: #ff5c8a;
      --gold: #ffd28a;
      --amber: #ffb347;
      --text: #fdeede;
      --muted: #b7a3cf;
      --panel: rgba(40, 22, 64, 0.55);
      --panel-line: rgba(255, 210, 138, 0.22);
      --shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.7);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow: hidden; }

    body {
      font-family: "Quicksand", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(110% 82% at 50% 112%, rgba(255, 157, 201, 0.28), transparent 56%),
        radial-gradient(75% 55% at 50% -8%, rgba(119, 64, 182, 0.42), transparent 60%),
        linear-gradient(160deg, #170c2b, #2a143e);
      position: relative;
    }

    #scene { position: fixed; inset: 0; display: block; touch-action: none; }

    /* ---- Headline ---- */
    .headline {
      position: fixed; top: clamp(18px, 5vh, 48px); left: 0; right: 0;
      text-align: center; pointer-events: none; z-index: 3;
      padding: 0 16px;
    }
    .headline .eyebrow {
      font-size: clamp(11px, 2.4vw, 14px); letter-spacing: 0.42em;
      text-transform: uppercase; color: var(--gold); opacity: 0.85;
      font-weight: 600; margin-bottom: 6px;
    }
    .headline h1 {
      font-family: "Pacifico", cursive; font-weight: 400;
      font-size: clamp(34px, 9vw, 76px); line-height: 1.05; margin: 0;
      color: var(--cream);
      text-shadow: 0 2px 0 rgba(255, 92, 138, 0.35), 0 18px 50px rgba(255, 122, 89, 0.45);
    }
    .headline h1 .name { color: var(--coral); display: inline-block; }

    /* ---- Bottom control panel ---- */
    .dock {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: clamp(16px, 4vh, 36px); z-index: 4; width: min(520px, calc(100% - 28px));
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 22px; padding: 16px;
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      box-shadow: var(--shadow);
    }
    .hint {
      text-align: center; color: var(--muted); font-size: 14px;
      min-height: 20px; margin: 0 0 12px; transition: color 0.3s; font-weight: 500;
    }
    .hint b { color: var(--gold); }

    .row { display: flex; gap: 10px; align-items: stretch; }
    .field {
      flex: 1; display: flex; flex-direction: column; gap: 4px;
    }
    .field label {
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); padding-left: 4px; font-weight: 700;
    }
    .field input {
      width: 100%; background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 14px;
      color: var(--text); font-family: inherit; font-size: 16px; font-weight: 600;
      padding: 11px 14px; outline: none; transition: border-color 0.2s, background 0.2s;
    }
    .field input:focus { border-color: var(--coral); background: rgba(255, 255, 255, 0.1); }
    .field.wishes { flex: 0 0 92px; }
    .field.wishes input { text-align: center; }
    .hidden { display: none !important; }
    .dock.messages { width: min(820px, calc(100% - 28px)); bottom: clamp(12px, 3vh, 26px); }
    .panel.is-expanded { max-height: min(66vh, 560px); overflow-y: auto; }
    .message-step { display: none; }
    .message-step.show { display: block; }
    .message-step-title {
      margin: 2px 0 12px; text-align: center; color: var(--cream);
      font-family: "Pacifico", cursive; font-size: 25px; font-weight: 400;
    }
    .message-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .wish-card {
      border: 1px solid rgba(255, 210, 138, 0.18); border-radius: 16px;
      background: rgba(255, 255, 255, 0.07); padding: 11px;
    }
    .wish-card.invalid { border-color: rgba(255, 92, 138, 0.8); box-shadow: 0 0 0 1px rgba(255, 92, 138, 0.18); }
    .wish-card h3 {
      margin: 0 0 8px; color: var(--gold); font-size: 12px; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 700;
    }
    .wish-card input, .wish-card textarea {
      width: 100%; border: 1px solid rgba(255, 255, 255, 0.14); border-radius: 12px;
      background: rgba(255, 255, 255, 0.08); color: var(--text); font-family: inherit;
      font-size: 14px; font-weight: 600; padding: 10px 11px; outline: none;
    }
    .wish-card textarea { min-height: 82px; resize: vertical; margin-top: 8px; line-height: 1.35; }
    .wish-card input:focus, .wish-card textarea:focus { border-color: var(--coral); background: rgba(255, 255, 255, 0.12); }
    .form-error { min-height: 18px; margin-top: 9px; text-align: center; color: #ffb3c8; font-size: 13px; font-weight: 700; }
    .message-modal {
      position: fixed; inset: 0; z-index: 7; display: grid; place-items: center;
      padding: 18px; background: rgba(18, 8, 34, 0.28); opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .message-modal.show { opacity: 1; pointer-events: auto; }
    .message-popup {
      width: min(440px, calc(100vw - 28px)); max-height: calc(100vh - 36px); overflow-y: auto; border-radius: 24px; padding: 22px;
      background: linear-gradient(180deg, rgba(255, 244, 230, 0.97), rgba(255, 223, 235, 0.96));
      border: 1px solid rgba(255, 210, 138, 0.55); color: #3a1730;
      box-shadow: 0 24px 80px -22px rgba(0, 0, 0, 0.78), inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transform: translateY(14px) scale(0.96); transition: transform 0.22s ease;
    }
    .message-modal.show .message-popup { transform: translateY(0) scale(1); }
    .message-title { font-family: "Pacifico", cursive; font-size: 30px; color: #ff5c8a; text-align: center; margin-bottom: 8px; }
    .message-sender { color: #7b4568; font-weight: 800; text-align: center; margin-bottom: 14px; }
    .message-text { color: #3a1730; font-size: 16px; line-height: 1.55; white-space: pre-wrap; margin: 0; }
    .message-close {
      margin-top: 18px; width: 100%; border: 0; border-radius: 14px; cursor: pointer;
      color: #2a0f1f; font: inherit; font-weight: 800; padding: 12px 16px;
      background: linear-gradient(180deg, var(--gold), var(--amber));
    }
    @media (max-width: 640px) {
      .dock.messages { width: min(560px, calc(100% - 20px)); }
      .panel.is-expanded { max-height: 62vh; padding: 13px; }
      .message-list { grid-template-columns: 1fr; }
      .message-step-title { font-size: 22px; }
    }

    .btn {
      margin-top: 12px; width: 100%; border: none; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 17px; color: #2a0f1f;
      padding: 14px 18px; border-radius: 16px;
      background: linear-gradient(180deg, var(--gold), var(--amber));
      box-shadow: 0 10px 24px -8px rgba(255, 179, 71, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: transform 0.12s ease, filter 0.2s, box-shadow 0.2s;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:active { transform: translateY(2px) scale(0.99); }
    .btn.ghost {
      background: rgba(255, 255, 255, 0.08); color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
    }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; }

    /* small floating controls (top-right) */
    .toolbar {
      position: fixed; top: 14px; right: 14px; z-index: 5; display: flex; gap: 8px;
    }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(40, 22, 64, 0.5); color: var(--text);
      backdrop-filter: blur(10px); font-size: 18px; line-height: 1;
      display: grid; place-items: center; transition: background 0.2s, transform 0.1s;
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.12); }
    .icon-btn:active { transform: scale(0.94); }

    .spin-tip {
      position: fixed; left: 50%; transform: translateX(-50%);
      top: clamp(130px, 24vh, 210px); z-index: 2; color: var(--muted);
      font-size: 13px; letter-spacing: 0.04em; opacity: 0.6; pointer-events: none;
      transition: opacity 0.6s;
    }
    .spin-tip.hide { opacity: 0; }

    /* confetti layer */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 6; overflow: hidden; }
    .confetto { position: absolute; top: -24px; will-change: transform, opacity; border-radius: 2px; }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; }
    }
  </style>

  <canvas id="scene"></canvas>

<div class="toolbar">
    <button class="icon-btn" id="sound" title="Sound on/off">🔊</button>
  </div>

  <div class="headline">
    <div class="eyebrow">your wishes await</div>
    <h1>Happy Birthday,<br><span class="name" id="nameOut">Nada</span>!</h1>
  </div>

  <div class="spin-tip" id="spinTip">drag to spin the cake ✦</div>

  <div class="dock" id="dock">
    <div class="panel" id="panel">
      <p class="hint" id="hint">Tap a gift to open its birthday message 🎁</p>
      <button class="btn" id="action">Open gifts 🎁</button>
    </div>
  </div>

  <div id="confetti"></div>

  <div class="message-modal" id="messageModal" aria-hidden="true">
    <div class="message-popup" role="dialog" aria-modal="true" aria-labelledby="messageTitle">
      <div class="message-title" id="messageTitle">A message for you</div>
      <div class="message-sender" id="messageSender">From: Friend</div>
      <p class="message-text" id="messageText"></p>
      <button class="message-close" id="messageClose">Close</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>
  (function () {
    "use strict";
    var loadedWishes = [];
    var loadedName = "Nadaa";
    
    // ----------------------------------------------------------- State
    var STATE = { phase: "setup", name: "Nadaa", wishes: [], openGiftId: null, selectedWish: null, messageVisible: false };
    var els = {
      canvas: document.getElementById("scene"),
      dock: document.getElementById("dock"),
      panel: document.getElementById("panel"),
      messageModal: document.getElementById("messageModal"),
      messageSender: document.getElementById("messageSender"),
      messageText: document.getElementById("messageText"),
    messageClose: document.getElementById("messageClose"),
    nameOut: document.getElementById("nameOut"),
    action: document.getElementById("action"),
    hint: document.getElementById("hint"),
    confetti: document.getElementById("confetti"),
    sound: document.getElementById("sound"),
    spinTip: document.getElementById("spinTip")
  };
  
  var cachedVoices = [];
  var ttsEnabled = true;
  
  function loadVoices() {
    cachedVoices = speechSynthesis.getVoices();
    console.log("Available voices:", cachedVoices.map(v => v.name + " (" + v.lang + ")"));
  }
  
  function isArabic(text) {
    return /[\u0600-\u06FF]/.test(text);
  }
  
  function getTtsVoice(text) {
    if (isArabic(text)) {
      var arVoice = cachedVoices.find(v => v.lang.startsWith('ar'));
      return arVoice || null;
    }
    return cachedVoices.find(v => v.lang === 'en-GB') || 
           cachedVoices.find(v => v.lang.startsWith('en-')) || 
           null;
  }
  
  function speak(text) {
    if (!ttsEnabled || !text) return;
    var voice = getTtsVoice(text);
    if (!voice && isArabic(text)) return; // Skip if Arabic and no Arabic voice
    var utter = new SpeechSynthesisUtterance(text);
    if (voice) utter.voice = voice;
    speechSynthesis.speak(utter);
  }
  
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  loadVoices();
  
  // ----------------------------------------------------------- Three.js core
  var renderer = new THREE.WebGLRenderer({ canvas: els.canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    var scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x1a1030, 0.018);

    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);

    var ambient = new THREE.AmbientLight(0x6a4a8a, 0.55);
    scene.add(ambient);
    var key = new THREE.DirectionalLight(0xffe6c4, 0.45);
    key.position.set(4, 8, 5);
    scene.add(key);
    var rim = new THREE.DirectionalLight(0xff7a59, 0.3);
    rim.position.set(-6, 2, -4);
    scene.add(rim);

    // soft warm glow at the candle flames on top of the cake
    var topperGlow = new THREE.PointLight(0xffb380, 1.1, 9, 2);
    topperGlow.position.set(0, 4.25, 0);
    scene.add(topperGlow);

    var cake = new THREE.Group();
    scene.add(cake);

    // soft circular plate / table â€” bigger and pale pink like the reference
    var plateMat = new THREE.MeshStandardMaterial({ color: 0xc8a3ba, roughness: 0.58, metalness: 0.08 });
    var plate = new THREE.Mesh(new THREE.CylinderGeometry(3.8, 3.95, 0.22, 96), plateMat);
    plate.position.y = -0.16;
    cake.add(plate);
    var plateLip = new THREE.Mesh(
      new THREE.TorusGeometry(3.82, 0.045, 16, 96),
      new THREE.MeshStandardMaterial({ color: 0x2b1936, roughness: 0.35, metalness: 0.25 })
    );
    plateLip.rotation.x = Math.PI / 2; plateLip.position.y = -0.03;
    cake.add(plateLip);

    // ------------------------- Three-tier round cake
    var BOT_R = 1.95, BOT_H = 0.78;
    var MID_R = 1.45, MID_H = 0.72;
    var TOP_R = 1.05, TOP_H = 0.66;
    var FROST_H = 0.12;

    var botBase     = 0;
    var botTop      = botBase + BOT_H;            // 0.78
    var fr1Top      = botTop + FROST_H;           // 0.90
    var midBase     = fr1Top;
    var midTop      = midBase + MID_H;            // 1.62
    var fr2Top      = midTop + FROST_H;           // 1.74
    var topBase     = fr2Top;
    var topTop      = topBase + TOP_H;            // 2.40
    var topFrostTop = topTop + FROST_H;           // 2.52
    var candleSurfaceY = topFrostTop + 0.06;      // candles sit here

    var bodyMatBot = new THREE.MeshStandardMaterial({ color: 0xf4bed3, roughness: 0.82 });
    var bodyMatMid = new THREE.MeshStandardMaterial({ color: 0xf7c8d8, roughness: 0.82 });
    var bodyMatTop = new THREE.MeshStandardMaterial({ color: 0xfad5e0, roughness: 0.82 });
    var frostMat   = new THREE.MeshStandardMaterial({ color: 0xfffbfb, roughness: 0.48 });

    function addTier(radius, height, baseY, mat, segs) {
      var m = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, height, segs), mat);
      m.position.y = baseY + height / 2;
      cake.add(m);
    }
    function addFrostDisc(radius, baseY, segs) {
      var m = new THREE.Mesh(new THREE.CylinderGeometry(radius + 0.02, radius + 0.02, FROST_H, segs), frostMat);
      m.position.y = baseY + FROST_H / 2;
      cake.add(m);
    }
    addTier(BOT_R, BOT_H, botBase, bodyMatBot, 72); addFrostDisc(BOT_R, botTop, 72);
    addTier(MID_R, MID_H, midBase, bodyMatMid, 68); addFrostDisc(MID_R, midTop, 68);
    addTier(TOP_R, TOP_H, topBase, bodyMatTop, 60); addFrostDisc(TOP_R, topTop, 60);

    // ---- buttercream rim beads on top edge of each tier ----
    var rimMat = new THREE.MeshStandardMaterial({ color: 0xffeff7, roughness: 0.45 });
    function rimBeads(radius, y, count, beadR) {
      for (var i = 0; i < count; i++) {
        var a = (i / count) * Math.PI * 2;
        var b = new THREE.Mesh(new THREE.SphereGeometry(beadR, 16, 12), rimMat);
        b.position.set(Math.cos(a) * radius, y, Math.sin(a) * radius);
        b.scale.set(1.0, 0.85, 1.0);
        cake.add(b);
      }
    }
    rimBeads(BOT_R - 0.01, fr1Top + 0.02, 76, 0.085);
    rimBeads(MID_R - 0.01, fr2Top + 0.02, 60, 0.080);
    rimBeads(TOP_R - 0.01, topFrostTop + 0.02, 48, 0.072);

    // ---- scalloped pearl garlands wrapping each tier ----
    var pearlMat = new THREE.MeshStandardMaterial({ color: 0xfff7fb, roughness: 0.38 });
    function pearlGarland(radius, yBase, sag, scallops, beadR, beadCount) {
      for (var i = 0; i < beadCount; i++) {
        var a = (i / beadCount) * Math.PI * 2;
        var dip = Math.abs(Math.sin((i / beadCount) * scallops * Math.PI));
        var y = yBase - sag * dip;
        var bead = new THREE.Mesh(new THREE.SphereGeometry(beadR, 12, 10), pearlMat);
        bead.position.set(Math.cos(a) * (radius + beadR * 0.6), y, Math.sin(a) * (radius + beadR * 0.6));
        cake.add(bead);
      }
    }

    var BOT_SCALLOPS = 8;
    pearlGarland(BOT_R, botBase + BOT_H * 0.78, 0.22, BOT_SCALLOPS, 0.060, 184);
    pearlGarland(BOT_R, botBase + BOT_H * 0.34, 0.20, BOT_SCALLOPS, 0.055, 184);

    var MID_SCALLOPS = 7;
    pearlGarland(MID_R, midBase + MID_H * 0.50, 0.19, MID_SCALLOPS, 0.055, 140);

    var TOP_SCALLOPS = 6;
    pearlGarland(TOP_R, topBase + TOP_H * 0.50, 0.17, TOP_SCALLOPS, 0.052, 104);

    // ---- pink bows at scallop peaks ----
    var bowMat = new THREE.MeshStandardMaterial({ color: 0xff75bd, roughness: 0.42, metalness: 0.03 });
    function makeBow(s) {
      var g = new THREE.Group();
      function loop(side) {
        var tor = new THREE.Mesh(new THREE.TorusGeometry(0.11 * s, 0.028 * s, 10, 22), bowMat);
        tor.scale.set(1.0, 0.7, 0.5);
        tor.position.x = side * 0.12 * s;
        tor.rotation.z = side * 0.5;
        return tor;
      }
      g.add(loop(-1)); g.add(loop(1));
      var knot = new THREE.Mesh(new THREE.SphereGeometry(0.05 * s, 12, 10),
        new THREE.MeshStandardMaterial({ color: 0xffeff7, roughness: 0.35 }));
      g.add(knot);
      [-1, 1].forEach(function (side) {
        var tail = new THREE.Mesh(new THREE.CylinderGeometry(0.012 * s, 0.024 * s, 0.34 * s, 8), bowMat);
        tail.position.set(side * 0.05 * s, -0.2 * s, 0);
        tail.rotation.z = side * 0.2;
        g.add(tail);
      });
      return g;
    }
    function placeBows(scallops, scale, radius, y) {
      for (var b = 0; b < scallops; b++) {
        var a = (b / scallops) * Math.PI * 2;
        var bw = makeBow(scale);
        bw.position.set(Math.cos(a) * (radius + 0.06), y, Math.sin(a) * (radius + 0.06));
        bw.rotation.y = Math.PI / 2 - a;
        cake.add(bw);
      }
    }
    placeBows(BOT_SCALLOPS, 1.00, BOT_R, botBase + BOT_H * 0.78);
    placeBows(MID_SCALLOPS, 0.90, MID_R, midBase + MID_H * 0.50);
    placeBows(TOP_SCALLOPS, 0.80, TOP_R, topBase + TOP_H * 0.50);

    // ---- sprinkles ----
    var sprinkleColors = [0xff8fc5, 0xffd28a, 0xb9f1df, 0xbad9ff, 0xd8b8ff, 0xffffff];
    function makeSprinkle(x, y, z) {
      var sp = new THREE.Mesh(
        new THREE.BoxGeometry(0.035, 0.018, 0.12),
        new THREE.MeshStandardMaterial({ color: sprinkleColors[(Math.random() * sprinkleColors.length) | 0], roughness: 0.4 })
      );
      sp.position.set(x, y, z);
      sp.rotation.y = Math.random() * Math.PI;
      cake.add(sp);
    }
    function sprinkleDisc(yTop, rMax, count) {
      for (var i = 0; i < count; i++) {
        var ang = Math.random() * Math.PI * 2;
        var rr = Math.sqrt(Math.random()) * rMax;
        makeSprinkle(Math.cos(ang) * rr, yTop + 0.005, Math.sin(ang) * rr);
      }
    }
    function sprinkleRing(yTop, rIn, rOut, count) {
      for (var i = 0; i < count; i++) {
        var ang = Math.random() * Math.PI * 2;
        var rr = Math.sqrt(rIn * rIn + Math.random() * (rOut * rOut - rIn * rIn));
        makeSprinkle(Math.cos(ang) * rr, yTop + 0.005, Math.sin(ang) * rr);
      }
    }
    sprinkleDisc(candleSurfaceY, TOP_R - 0.18, 26);
    sprinkleRing(fr2Top,        TOP_R + 0.12, MID_R - 0.16, 32);
    sprinkleRing(fr1Top,        MID_R + 0.12, BOT_R - 0.18, 42);

    // ------------------------- "19" 3D number candle topper
    var topperFill = new THREE.MeshStandardMaterial({
      color: 0xfff2df,
      roughness: 0.28,
      metalness: 0.03,
      emissive: 0x3b1609,
      emissiveIntensity: 0.04
    });
    var topperPink = new THREE.MeshStandardMaterial({
      color: 0xff3f73,
      roughness: 0.24,
      metalness: 0.06,
      emissive: 0x3b0013,
      emissiveIntensity: 0.08
    });
    var topperWick = new THREE.MeshStandardMaterial({ color: 0x26140e, roughness: 0.55 });
    var topperDot = new THREE.MeshStandardMaterial({ color: 0x8fcfff, roughness: 0.36, metalness: 0.02, side: THREE.DoubleSide });
    var topperFlames = [];

    var NUMBER_TEXT = "19";
    var NUMBER_DEPTH = 0.32;
    var NUMBER_TARGET_WIDTH = 0.92;
    var NUMBER_TARGET_HEIGHT = 0.98;
    var NUMBER_EMBED = 0.075;

    function centerGeometryToCakeBase(geo, depth) {
      geo.computeBoundingBox();
      var box = geo.boundingBox;
      var cx = (box.min.x + box.max.x) / 2;
      geo.translate(-cx, -box.min.y, -depth / 2);
      geo.computeBoundingBox();
    }

    function measureShapes(shapes) {
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      function scan(points) {
        for (var i = 0; i < points.length; i++) {
          minX = Math.min(minX, points[i].x); minY = Math.min(minY, points[i].y);
          maxX = Math.max(maxX, points[i].x); maxY = Math.max(maxY, points[i].y);
        }
      }
      for (var s = 0; s < shapes.length; s++) {
        scan(shapes[s].getPoints(120));
        for (var h = 0; h < shapes[s].holes.length; h++) scan(shapes[s].holes[h].getPoints(96));
      }
      return { minX: minX, minY: minY, maxX: maxX, maxY: maxY, cx: (minX + maxX) / 2, width: maxX - minX, height: maxY - minY };
    }

    function makePipeFromPoints(points, metrics, z) {
      var pts3 = [];
      for (var i = 0; i < points.length; i++) {
        pts3.push(new THREE.Vector3(points[i].x - metrics.cx, points[i].y - metrics.minY, z));
      }
      var curve = new THREE.CatmullRomCurve3(pts3, true, "centripetal");
      return new THREE.Mesh(new THREE.TubeGeometry(curve, Math.max(36, pts3.length * 2), 0.026, 10, true), topperPink);
    }

    function addTextPiping(group, shapes, metrics) {
      var zFront = NUMBER_DEPTH / 2 + 0.026;
      var zBack = -NUMBER_DEPTH / 2 - 0.026;
      for (var i = 0; i < shapes.length; i++) {
        var shape = shapes[i];
        group.add(makePipeFromPoints(shape.getPoints(180), metrics, zFront));
        group.add(makePipeFromPoints(shape.getPoints(180), metrics, zBack));
        for (var h = 0; h < shape.holes.length; h++) {
          group.add(makePipeFromPoints(shape.holes[h].getPoints(140), metrics, zFront));
          group.add(makePipeFromPoints(shape.holes[h].getPoints(140), metrics, zBack));
        }
      }
    }

    function addCandleDots(group, width, height) {
      var dots = [
        [-0.36, 0.22, 0.030], [-0.34, 0.48, 0.036], [-0.30, 0.74, 0.032],
        [ 0.10, 0.80, 0.034], [ 0.28, 0.74, 0.030], [ 0.34, 0.52, 0.036],
        [ 0.12, 0.43, 0.031], [ 0.32, 0.22, 0.034]
      ];
      for (var i = 0; i < dots.length; i++) {
        var d = dots[i];
        var dot = new THREE.Mesh(new THREE.CircleGeometry(d[2], 18), topperDot);
        dot.position.set(d[0] * width, d[1] * height, NUMBER_DEPTH / 2 + 0.055);
        group.add(dot);
        var back = new THREE.Mesh(new THREE.CircleGeometry(d[2] * 0.9, 18), topperDot);
        back.rotation.y = Math.PI;
        back.position.set(d[0] * width, d[1] * height, -NUMBER_DEPTH / 2 - 0.055);
        group.add(back);
      }
    }

    function addFlame(group, x, y, scale, seed) {
      var ring = new THREE.Mesh(new THREE.TorusGeometry(0.062 * scale, 0.014 * scale, 8, 24), topperPink);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(x, y + 0.014 * scale, 0);
      group.add(ring);

      var wick = new THREE.Mesh(new THREE.CylinderGeometry(0.012 * scale, 0.012 * scale, 0.12 * scale, 8), topperWick);
      wick.position.set(x, y + 0.07 * scale, 0);
      group.add(wick);

      var flame = new THREE.Group();
      var outer = new THREE.Mesh(
        new THREE.SphereGeometry(0.075 * scale, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xff8a2b, transparent: true, opacity: 0.86, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      outer.scale.set(0.85, 1.85, 0.85);
      var core = new THREE.Mesh(
        new THREE.SphereGeometry(0.038 * scale, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xfff1a8, transparent: true, opacity: 1, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      core.scale.set(0.82, 1.55, 0.82);
      var light = new THREE.PointLight(0xffb347, 0.55, 2.2, 2);
      flame.add(outer); flame.add(core); flame.add(light);
      flame.position.set(x, y + 0.24 * scale, 0);
      group.add(flame);
      topperFlames.push({ flame: flame, outer: outer, light: light, seed: seed });
    }

    function addSupportPins(group, positions) {
      var pinMat = new THREE.MeshStandardMaterial({ color: 0xffd7e3, roughness: 0.32, metalness: 0.02 });
      for (var i = 0; i < positions.length; i++) {
        var pin = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.032, 0.22, 12), pinMat);
        pin.position.set(positions[i], -0.035, 0);
        group.add(pin);
      }
    }

    function buildTextNumberCandle(font) {
      var group = new THREE.Group();
      var textOptions = {
        font: font,
        size: 1,
        height: NUMBER_DEPTH,
        curveSegments: 22,
        bevelEnabled: true,
        bevelThickness: 0.035,
        bevelSize: 0.045,
        bevelSegments: 8
      };
      var geo = new THREE.TextGeometry(NUMBER_TEXT, textOptions);
      centerGeometryToCakeBase(geo, NUMBER_DEPTH);
      var body = new THREE.Mesh(geo, [topperFill, topperPink]);
      group.add(body);

      var shapes = font.generateShapes(NUMBER_TEXT, 1);
      var metrics = measureShapes(shapes);
      addTextPiping(group, shapes, metrics);
      addCandleDots(group, metrics.width, metrics.height);

      var scale = Math.min(NUMBER_TARGET_WIDTH / metrics.width, NUMBER_TARGET_HEIGHT / metrics.height);
      addSupportPins(group, [-metrics.width * 0.30, metrics.width * 0.27]);
      addFlame(group, -metrics.width * 0.31, metrics.height + 0.015, 1, 1.7);
      addFlame(group,  metrics.width * 0.28, metrics.height + 0.015, 1, 6.4);
      group.scale.setScalar(scale);
      group.position.set(0, candleSurfaceY - NUMBER_EMBED, 0);
      cake.add(group);
    }

    function buildShapeNumberCandleFallback() {
      var group = new THREE.Group();
      var depth = NUMBER_DEPTH;
      function roundedRectShape(x, y, w, h, r) {
        var s = new THREE.Shape();
        s.moveTo(x + r, y);
        s.lineTo(x + w - r, y); s.quadraticCurveTo(x + w, y, x + w, y + r);
        s.lineTo(x + w, y + h - r); s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        s.lineTo(x + r, y + h); s.quadraticCurveTo(x, y + h, x, y + h - r);
        s.lineTo(x, y + r); s.quadraticCurveTo(x, y, x + r, y);
        return s;
      }
      function makeExtruded(shape) {
        var geo = new THREE.ExtrudeGeometry(shape, { depth: depth, bevelEnabled: true, bevelSize: 0.04, bevelThickness: 0.032, bevelSegments: 7, curveSegments: 28 });
        geo.translate(0, 0, -depth / 2);
        return geo;
      }
      function shapeNine() {
        var s = new THREE.Shape();
        s.moveTo(0, 1.48);
        s.bezierCurveTo(0.39, 1.48, 0.57, 1.25, 0.57, 1.03);
        s.bezierCurveTo(0.57, 0.82, 0.45, 0.66, 0.31, 0.58);
        s.lineTo(0.49, 0.06);
        s.bezierCurveTo(0.53, -0.06, 0.45, -0.12, 0.32, -0.12);
        s.lineTo(0.14, -0.12);
        s.bezierCurveTo(0.05, -0.12, 0.01, -0.06, 0.04, 0.02);
        s.lineTo(0.22, 0.49);
        s.bezierCurveTo(0.06, 0.45, -0.12, 0.46, -0.28, 0.55);
        s.bezierCurveTo(-0.50, 0.67, -0.60, 0.86, -0.60, 1.06);
        s.bezierCurveTo(-0.60, 1.30, -0.39, 1.48, 0, 1.48);
        s.closePath();
        var hole = new THREE.Path();
        hole.absellipse(-0.03, 1.05, 0.19, 0.21, 0, Math.PI * 2, false);
        s.holes.push(hole);
        return s;
      }
      var oneOuter = roundedRectShape(-0.54, 0, 0.22, 1.42, 0.10);
      var one = new THREE.Mesh(makeExtruded(oneOuter), [topperFill, topperPink]);
      var nine = new THREE.Mesh(makeExtruded(shapeNine()), [topperFill, topperPink]);
      nine.position.x = 0.23;
      group.add(one); group.add(nine);
      addFlame(group, -0.43, 1.45, 1, 2.2);
      addFlame(group, 0.23, 1.50, 1, 7.3);
      addSupportPins(group, [-0.43, 0.25]);
      group.scale.setScalar(0.70);
      group.position.set(0, candleSurfaceY - NUMBER_EMBED, 0);
      cake.add(group);
    }

        );

        g.userData.lidPivot.rotation.x = 0;
      }
      if (g.userData.innerGlow) g.userData.innerGlow.intensity = 0;
    }
    function giftById(id) {
      for (var i = 0; i < gifts.length; i++) if (gifts[i].userData.wishId === id) return gifts[i];
      return null;
    }
    function showWishMessage(wish) {
      if (!wish) return;
      STATE.selectedWish = wish;
      STATE.messageVisible = true;
      els.messageSender.textContent = "From: " + (wish.sender || "Friend");
      els.messageText.textContent = wish.message || "";
      els.messageModal.classList.add("show");
      els.messageModal.setAttribute("aria-hidden", "false");
      speak(wish.message || "");
    }
    function hideWishMessage() {
      if (speechSynthesis.speaking) speechSynthesis.cancel();
      STATE.messageVisible = false;
      STATE.selectedWish = null;
      els.messageModal.classList.remove("show");
      els.messageModal.setAttribute("aria-hidden", "true");
      if (STATE.videoReady && STATE.phase === "wishing") {
        celebrate();
      }
    }

    function openGift(g) {
      if (!g || g.userData.opening) return;
      if (STATE.phase !== "wishing" && STATE.phase !== "celebrate") return;
      if (g.userData.opened) { showWishMessage(g.userData.wish); return; }
      hideWishMessage();
      if (STATE.openGiftId && STATE.openGiftId !== g.userData.wishId) closeGiftVisual(giftById(STATE.openGiftId));
      STATE.openGiftId = g.userData.wishId;
      g.userData.opening = true;
      g.userData.openStart = clock.elapsedTime;
      g.userData.hasOpened = true;
      if (g.userData.lidPivot) {
        g.userData.lidPivot.position.y = g.userData.lidClosedY;
        g.userData.lidPivot.rotation.x = 0;
      }
      if (g.userData.innerGlow) g.userData.innerGlow.intensity = 0.18;
      sparkleSound();
      var wp = new THREE.Vector3();
      if (g.userData.burstOrigin) g.userData.burstOrigin.getWorldPosition(wp);
      else g.getWorldPosition(wp);
      spawnSparkles(wp, 18);
      setHint("Opening a birthday message from <b>" + escapeHtml(g.userData.wish.sender || "Friend") + "</b>...");
      setTimeout(function () {
        if (STATE.openGiftId === g.userData.wishId) showWishMessage(g.userData.wish);
        checkAllOpened();
      }, 900);
    }
    function openOne() {
      var pool = [];
      for (var i = 0; i < gifts.length; i++) {
        var g = gifts[i];
        if (!g.userData.opening && !g.userData.hasOpened) pool.push(g);
      }
      if (!pool.length) {
        for (var j = 0; j < gifts.length; j++) if (!gifts[j].userData.opening && gifts[j].userData.wishId !== STATE.openGiftId) pool.push(gifts[j]);
      }
      if (pool.length) openGift(pool[(Math.random() * pool.length) | 0]);
    }
function checkAllOpened() {
    for (var i = 0; i < gifts.length; i++) {
      if (!gifts[i].userData.hasOpened) return;
    }
    STATE.videoReady = true;
  }

    function celebrate() {
      if (STATE.phase === "celebrate") return;
      STATE.phase = "celebrate";
      poofSound();
      burstConfetti(150);
      setTimeout(function () { burstConfetti(80); }, 900);
      setHint("🎉 Wishes opened! Happy Birthday, <b>" + escapeHtml(STATE.name) + "</b> 🎉");
      showVideoModal();
    }

    function showVideoModal() {
      var wasTtsEnabled = ttsEnabled;
      ttsEnabled = false;
      var video = document.createElement("video");
      video.src = "models/video.mp4";
      video.autoplay = true;
      video.playsInline = true;
      video.style.position = "fixed";
      video.style.top = "0";
      video.style.left = "0";
      video.style.width = "100%";
      video.style.height = "100%";
      video.style.zIndex = "100";
      video.style.objectFit = "cover";
      video.style.background = "black";
      video.controls = false;
      video.onended = function() {
        document.body.removeChild(video);
        STATE.phase = "wishing";
        resetGiftsVisual();
        STATE.videoReady = false;
        ttsEnabled = wasTtsEnabled;
      };
      document.body.appendChild(video);
    }

    function resetGiftsVisual() {
      for (var i = 0; i < gifts.length; i++) {
        var g = gifts[i];
        closeGiftVisual(g);
        g.userData.hasOpened = false;
        g.position.y = g.userData.baseY;
        g.scale.set(1, 1, 1);
      }
      STATE.openGiftId = null;
      setHoveredGift(null);
    }

    function showStartForm() {
      els.startFields.classList.remove("hidden");
      els.messageStep.classList.remove("show");
      els.dock.classList.remove("messages");
      els.panel.classList.remove("is-expanded");
    }
    function showMessageForm() {}
    function showSceneControls() {
      els.dock.classList.add("messages");
      els.panel.classList.add("is-expanded");
    }

    function goSetup() {
      STATE.phase = "setup";
      STATE.wishes = [];
      STATE.selectedWish = null;
      hideWishMessage();
      resetGiftsVisual();
      clearGifts();
      setHint("Tap a gift to open its birthday message 🎁");
      els.action.textContent = "Open gifts 🎁";
      els.action.classList.remove("ghost");
      els.action.disabled = false;
    }

    function goDirectWithWishes(wishes) {
      STATE.wishes = wishes.map(function(w, i) {
        return { id: "wish-" + (i + 1), sender: w.name, message: w.message };
      });
      goWishing();
    }

    function goWishing() {
      STATE.phase = "wishing";
      hideWishMessage();
      resetGiftsVisual();
      showSceneControls();
      setHint("Tap a gift to open its birthday message 🎁");
      els.action.textContent = "Open one for me 🎁";
      els.action.classList.remove("ghost");
      buildGifts(STATE.wishes);
    }
    
    // ----------------------------------------------------------- UI wiring
    function escapeHtml(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
    function syncName() {
      var v = loadedName || "Nada";
      STATE.name = v;
      els.nameOut.textContent = v;
    }

    els.messageClose.addEventListener("click", hideWishMessage);
    els.messageModal.addEventListener("click", function (e) { if (e.target === els.messageModal) hideWishMessage(); });
    window.addEventListener("keydown", function (e) { if (e.key === "Escape" && STATE.messageVisible) hideWishMessage(); });

els.action.addEventListener("click", function () {
    ensureAudio();
    if (STATE.phase === "setup") {
      syncName();
      goDirectWithWishes(loadedWishes);
    } else if (STATE.phase === "wishing") {
      openOne();
    } else if (STATE.phase === "celebrate") {
      STATE.phase = "wishing";
      STATE.videoReady = false;
      resetGiftsVisual();
      els.action.textContent = "Open one for me 🎁";
    }
  });
  
// Initialize name and load wishes
  syncName();
  fetch('wishes.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      loadedName = data.name || "Nada";
      loadedWishes = Array.isArray(data.wishes) ? data.wishes : [];
      // Auto-proceed if wishes are loaded
      if (loadedWishes.length > 0 && STATE.phase === "setup") {
        goDirectWithWishes(loadedWishes);
      }
    })
    .catch(function() { window.location.reload(); });
})();
  </script>
